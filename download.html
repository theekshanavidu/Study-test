    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('url');
        
        // *** මෙතනට ඔයාගේ DIRECT LINK එක අනිවාර්යයෙන්ම පේස්ට් කරන්න ***
        const adsterraDirectLink = "ඔයාගේ_DIRECT_LINK_එක_මෙතනට";

        var timeLeft = 10;
        var timerId = setInterval(countdown, 1000);

        function countdown() {
            if (timeLeft <= 0) {
                clearTimeout(timerId);
                document.getElementById('seconds').style.display = 'none';
                const btn = document.getElementById('download-btn');
                btn.style.display = 'inline-block';
                
                btn.onclick = function() {
                    // 1. Direct Link එක අලුත් ටැබ් එකක ඕපන් කරයි
                    window.open(adsterraDirectLink, '_blank');
                    
                    // 2. තත්පරයකට පසු නියම ලින්ක් එකට මේ ටැබ් එකෙන් යවයි
                    setTimeout(function() {
                        if(destination) {
                            window.location.href = destination;
                        } else {
                            alert("නියමිත ගොනුව සොයාගත නොහැක.");
                        }
                    }, 1000);
                };
            } else {
                document.getElementById('seconds').innerHTML = timeLeft;
                timeLeft--;
            }
        }
    </script>
